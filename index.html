<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo}=React;
const START=new Date(2026,4,4);// May 4 2026 (Mon)
const RACE=new Date(2027,3,24);// Apr 24 2027
// 5 phases across ~51 weeks
// Phase 1: Base (W0-8, May-Jun) — aerobic foundation, slow progression
// Phase 2: Heat (W9-17, Jul-Aug) — reduced intensity, heat adaptation
// Phase 3: Build (W18-30, Sep-Nov) — volume peak, main development
// Phase 4: Cold (W31-39, Dec-Jan) — maintain with cold adjustment
// Phase 5: Race (W40-50, Feb-Apr) — race specific + taper
// References: Pfitzinger "Faster Road Racing" base building; BJSM 2025 single-run spike <10%; ACSM heat guidelines +30-45s/km; cutback every 3-4 weeks
const PHASES=[
  {id:"base",  name:"베이스 빌드", color:"#22c55e", weeks:[0,8],  desc:"유산소 기초 · 느린 점진 적응",    heatAdj:false,coldAdj:false},
  {id:"heat",  name:"혹서기 적응", color:"#f59e0b", weeks:[9,17], desc:"강도↓ · 새벽 러닝 · 수분 관리",   heatAdj:true, coldAdj:false},
  {id:"build", name:"볼륨 빌드",  color:"#06b6d4", weeks:[18,30],desc:"주간 거리 피크 · 핵심 발달 구간",  heatAdj:false,coldAdj:false},
  {id:"cold",  name:"혹한기 유지", color:"#8b5cf6", weeks:[31,39],desc:"웜업 강화 · 유지 + 근지구력",     heatAdj:false,coldAdj:true},
  {id:"race",  name:"레이스 준비", color:"#ef4444", weeks:[40,50],desc:"목표 페이스 체화 · 테이퍼링",     heatAdj:false,coldAdj:false},
];
function getPhase(wi){return PHASES.find(p=>wi>=p.weeks[0]&&wi<=p.weeks[1])||PHASES[0]}
// Generate weekly targets programmatically
// Progression: long run 6→21km (single-run increase <10% per BJSM), cutback every 4th week
function genWeek(wi){
  const p=getPhase(wi);
  const pid=p.id;
  const weekInPhase=wi-p.weeks[0];
  const isCutback=(wi+1)%4===0; // every 4th week
  let recov,iKm,interval,tempo,longRun;
  // Base targets by phase (non-cutback)
  if(pid==="base"){
    // W0-8: gentle start, LR 6→10, weekly ~20→28
    recov=3+Math.min(weekInPhase*0.25,2);
    interval=weekInPhase<3?"없음":"400m×"+(3+Math.floor(weekInPhase/3));
    iKm=weekInPhase<3?0:4+weekInPhase*0.3;
    tempo=4+weekInPhase*0.25;
    longRun=6+weekInPhase*0.5;
  }else if(pid==="heat"){
    // W9-17: reduce ~15% from end of base due to heat
    recov=4; interval="400m×"+(4+Math.floor(weekInPhase/3)); iKm=5+weekInPhase*0.2;
    tempo=5.5+weekInPhase*0.2; longRun=9+weekInPhase*0.4;
  }else if(pid==="build"){
    // W18-30: main development, LR 11→18, tempo 7→10
    recov=4+Math.min(weekInPhase*0.15,2);
    const repDist=weekInPhase<4?"600m":weekInPhase<8?"800m":"1km";
    const repCount=weekInPhase<4?4:weekInPhase<8?4:3;
    interval=`${repDist}×${repCount}`;
    iKm=6+weekInPhase*0.2;
    tempo=7+weekInPhase*0.25;
    longRun=11+weekInPhase*0.55;
  }else if(pid==="cold"){
    // W31-39: maintain high end with slight cold reduction
    recov=5; const repDist=weekInPhase<5?"800m":"1km";
    interval=`${repDist}×${3+Math.floor(weekInPhase/3)}`;
    iKm=7+weekInPhase*0.1; tempo=9+weekInPhase*0.15;
    longRun=15+weekInPhase*0.35;
  }else{
    // W40-50: race specific → taper (last 3 weeks)
    const taperWeek=wi>=48;const preTaper=wi>=46;
    recov=taperWeek?3:preTaper?4:5;
    interval=taperWeek?"400m×3":preTaper?"800m×3":`1km×${3+Math.floor(weekInPhase/4)}`;
    iKm=taperWeek?3:preTaper?5:7+weekInPhase*0.15;
    tempo=taperWeek?4:preTaper?6:9+weekInPhase*0.2;
    longRun=taperWeek?8:preTaper?12:weekInPhase<6?16+weekInPhase*0.6:20;
    if(wi===50)longRun=21.1;// race week
  }
  // Apply cutback: ~70% volume
  if(isCutback&&pid!=="race"){
    recov=Math.round(recov*0.7*10)/10;
    iKm=Math.round(iKm*0.7*10)/10;
    tempo=Math.round(tempo*0.7*10)/10;
    longRun=Math.round(longRun*0.75*10)/10;
  }
  // Round
  recov=Math.round(recov*10)/10;
  iKm=Math.round(iKm*10)/10;
  tempo=Math.round(tempo*10)/10;
  longRun=Math.round(longRun*10)/10;
  // Week label
  const ws=addDays(START,wi*7);
  const m=ws.getMonth()+1;
  const wInMonth=Math.ceil(ws.getDate()/7);
  const name=`${m}월 ${wInMonth}주`;
  const goal=isCutback?"🔵 컷백 주간 (회복)":p.desc;
  return{idx:wi,name,phase:p.name,phaseId:pid,recov,interval,iKm,tempo,longRun,goal,isCutback,
    heatAdj:p.heatAdj,coldAdj:p.coldAdj};
}
const WEEKS=Array.from({length:51},(_,i)=>genWeek(i));
// Tasks: 토=롱런(고정), 일=완전휴식(고정)
const TASKS=[
  {id:0,type:"회복런+코어",icon:"🌿",color:"#22c55e",weight:10,hasDist:true, field:"recov",sugDay:"월",desc:"느린 러닝+데드버그·버드독·사이드플랭크"},
  {id:1,type:"인터벌",     icon:"⚡",color:"#f59e0b",weight:20,hasDist:true, field:"iKm",  sugDay:"화",desc:"rep 사이 동일시간 조깅 회복"},
  {id:3,type:"웨이트",     icon:"🏋️",color:"#a78bfa",weight:10,hasDist:false,field:null,    sugDay:"수",desc:"스쿼트·데드·런지+코어 (롱런까지 72h)"},
  {id:2,type:"템포런",     icon:"🏃",color:"#06b6d4",weight:20,hasDist:true, field:"tempo", sugDay:"목",desc:"목표 페이스로 일정하게"},
  {id:7,type:"웨이트",     icon:"🏋️",color:"#a78bfa",weight:10,hasDist:false,field:null,    sugDay:"금",desc:"상체+코어 위주 (하체 경량)"},
  {id:5,type:"롱런",       icon:"🔥",color:"#ef4444",weight:25,hasDist:true, field:"longRun",sugDay:"토(고정)",desc:"토요일 고정 · 주 최고 강도"},
  {id:6,type:"완전 휴식",  icon:"💤",color:"#475569",weight:5, hasDist:false,field:null,    sugDay:"일(고정)",desc:"일요일 고정 · 롱런 후 반드시 휴식"},
];
// Injury checklist
const INJURY_CHECKS=[
  {id:"pain_run",q:"러닝 중 통증이 있었나요?",severe:true},
  {id:"pain_after",q:"러닝 후 통증이 4시간 이상 지속되나요?",severe:true},
  {id:"pain_back",q:"허리 통증이 있나요?",severe:true},
  {id:"pain_knee",q:"무릎 통증이 있나요?",severe:false},
  {id:"pain_shin",q:"정강이(앞쪽) 통증이 있나요?",severe:false},
  {id:"swelling",q:"관절 부종이나 열감이 있나요?",severe:true},
  {id:"limp",q:"걸을 때 절거나 보행이 달라졌나요?",severe:true},
  {id:"sleep",q:"통증으로 수면에 영향이 있나요?",severe:true},
  {id:"stiff",q:"아침에 30분 이상 뻣뻣한가요?",severe:false},
  {id:"golf",q:"최근 골프 스윙 후 허리 불편감이 있나요?",severe:false},
];
function pad(n){return String(n).padStart(2,"0")}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function daysBetween(a,b){return Math.round((b-a)/86400000)}
function dateToWeekIdx(d){const diff=daysBetween(START,d);if(diff<0)return -1;const i=Math.floor(diff/7);return i<WEEKS.length?i:-1}
function weekStartDate(wi){return addDays(START,wi*7)}
// Pace targets
function getPace(task,week){
  const pid=week.phaseId;const ha=week.heatAdj;const ca=week.coldAdj;
  let base="";
  if(task.field==="recov") base="6:40~7:10/km";
  else if(task.field==="longRun"){
    if(pid==="base")base="7:00~7:30/km";
    else if(pid==="heat")base="7:20~7:50/km ☀️";
    else if(pid==="build")base="6:40~7:00/km";
    else if(pid==="cold")base="6:40~7:00/km · 웜업 10분 필수";
    else base=week.idx>=46?"6:30~6:50/km":"6:30~6:50/km · 후반3km 5:50";
  }else if(task.field==="tempo"){
    if(pid==="base")base="6:00~6:10/km";
    else if(pid==="heat")base="6:10~6:30/km ☀️";
    else if(pid==="build")base="5:45~5:55/km";
    else if(pid==="cold")base="5:45~5:55/km · 웜업 10분";
    else base="5:35~5:45/km (목표 페이스)";
  }else if(task.field==="iKm"){
    if(week.interval==="없음")return null;
    if(pid==="heat")base="5:10~5:20/km ☀️";
    else if(pid==="base")base="5:00~5:10/km";
    else base="4:50~5:05/km";
  }
  return base||null;
}
function getTargetPaceNum(task,week){
  const pid=week.phaseId;
  if(task.field==="recov")return 6.92;
  if(task.field==="longRun")return pid==="base"?7.25:pid==="heat"?7.58:pid==="build"?6.83:pid==="cold"?6.83:6.67;
  if(task.field==="tempo")return pid==="base"?6.08:pid==="heat"?6.33:pid==="build"?5.83:pid==="cold"?5.83:5.67;
  if(task.field==="iKm")return pid==="heat"?5.25:pid==="base"?5.08:5.0;
  return null;
}
function parsePace(s){if(!s)return null;s=String(s).trim();if(s.indexOf(":")!==-1){const p=s.split(":");return parseFloat(p[0])+(parseFloat(p[1])||0)/60}const n=parseFloat(s);return isNaN(n)?null:n}
function fmtPace(n){if(!n)return"";const m=Math.floor(n),s=Math.round((n-m)*60);return`${m}:${pad(s)}`}
function fmtMin(m){const h=Math.floor(m/60),mm=Math.floor(m%60),ss=Math.round(((m%60)-mm)*60);return`${h}:${pad(mm)}:${pad(ss)}`}
function taskScore(task,week,log){
  if(!log||!log.done)return 0;
  if(!task.hasDist)return task.weight;
  const target=week[task.field];if(!target)return task.weight;
  const actual=parseFloat(log.distance);const tp=getTargetPaceNum(task,week);const ap=parsePace(log.pace);
  let df=1.0;if(actual&&actual>0&&target>0)df=Math.max(Math.min(actual/target,1),0.3);
  let pf=1.0;if(ap&&tp){const diff=ap-tp;if(diff>0)pf=diff<=0.5?1-diff*0.6:diff<=1?0.7-(diff-0.5)*0.4:0.4;}
  return task.weight*df*pf;
}
function getTaskQuality(task,week,log){
  if(!log||!log.done)return{status:"미실행",color:"#64748b",pct:0,detail:"",earned:0};
  if(!task.hasDist)return{status:"완료",color:"#22c55e",pct:100,detail:"",earned:task.weight};
  const earned=taskScore(task,week,log);const pct=Math.round(earned/task.weight*100);
  const target=week[task.field];const actual=parseFloat(log.distance);
  const tp=getTargetPaceNum(task,week);const ap=parsePace(log.pace);
  let parts=[];
  if(actual&&actual>0&&target)parts.push(actual>=target?"거리 ✓":`거리 ${Math.round(actual/target*100)}%`);
  if(ap&&tp){const d=ap-tp;parts.push(d<=0?"페이스 ✓":`페이스 +${fmtPace(d)} 느림`);}
  const status=pct>=90?"목표 달성":pct>=70?"거의 달성":pct>=50?"부분 달성":"목표 미달";
  const color=pct>=90?"#22c55e":pct>=70?"#06b6d4":pct>=50?"#f59e0b":"#fb923c";
  return{status,color,pct,detail:parts.join(" · "),earned:Math.round(earned*10)/10};
}
function weekScore(w,wl){let s=0;TASKS.forEach(t=>{s+=taskScore(t,w,wl&&wl[t.id])});return Math.round(s)}
function monthScore(m,y,all){
  const mw=WEEKS.filter(w=>{const d=weekStartDate(w.idx);return d.getMonth()===m&&d.getFullYear()===y});
  const a=mw.filter(w=>all[w.idx]&&Object.values(all[w.idx]).some(l=>l.done));
  if(!a.length)return null;return Math.round(a.reduce((s,w)=>s+weekScore(w,all[w.idx]),0)/a.length);
}
function gradeInfo(s){
  if(s>=90)return{label:"정상",color:"#22c55e"};if(s>=75)return{label:"양호",color:"#06b6d4"};
  if(s>=60)return{label:"보완",color:"#f59e0b"};if(s>=40)return{label:"미달",color:"#fb923c"};
  return{label:"저조",color:"#ef4444"};
}
// Feasibility: 10K=58min → Riegel → 2:06:48 worst; perfect=1:59:00
const BASE_WORST=126.8,BASE_BEST=119.0,GOAL_MIN=120.0;
function getFeasibility(logs,today){
  const now=new Date();const p9=now.getHours()>=21;const cut=p9?addDays(today,1):today;
  let ptw=0,ew=0,missed=0,partial=0,perfect=0;
  WEEKS.forEach(w=>{TASKS.forEach(t=>{
    if(t.type==="완전 휴식"||t.type==="휴식")return;
    const sd=addDays(weekStartDate(w.idx),["월","화","수","목","금","토","일"].indexOf(t.sugDay.charAt(0)));
    if(sd<cut){ptw+=t.weight;const log=logs[w.idx]&&logs[w.idx][t.id];
      const earned=taskScore(t,w,log);ew+=earned;
      if(!log||!log.done)missed++;
      else if(t.hasDist&&(log.distance||log.pace)){if(Math.round(earned/t.weight*100)>=90)perfect++;else partial++;}
      else perfect++;
    }
  })});
  const qr=ptw>0?ew/ptw:1.0;
  const predicted=BASE_WORST-(BASE_WORST-BASE_BEST)*qr;
  return{predicted,feasible:predicted<=GOAL_MIN,diffMin:predicted-GOAL_MIN,qualityRate:qr,missed,partial,perfect,ptw,ew,beforeStart:today<START,is9pm:p9};
}
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ═══ APP ═══
function App(){
  const[tab,setTab]=useState("quick");
  const[logs,setLogs]=useState(()=>load("hm27-logs")||{});
  const[injuries,setInjuries]=useState(()=>load("hm27-inj")||{});
  const[showInjury,setShowInjury]=useState(false);
  const[tick,setTick]=useState(0);
  useEffect(()=>{save("hm27-logs",logs)},[logs]);
  useEffect(()=>{save("hm27-inj",injuries)},[injuries]);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),60000);return()=>clearInterval(t)},[]);
  const today=new Date();
  const daysLeft=daysBetween(today,RACE);
  const curWI=Math.max(0,dateToWeekIdx(today));
  const feas=useMemo(()=>getFeasibility(logs,today),[logs,tick]);
  const update=(wi,tid,data)=>{setLogs(p=>{const wl=p[wi]||{};return{...p,[wi]:{...wl,[tid]:{...(wl[tid]||{}),...data}}}})};
  const tabs=[{id:"quick",label:"기록",icon:"⊕"},{id:"cal",label:"캘린더",icon:"▦"},{id:"week",label:"이번주",icon:"✓"},{id:"score",label:"점수",icon:"◈"},{id:"injury",label:"부상",icon:"🩺"}];
  // Check active injury
  const activeInj=injuries.active;const restUntil=injuries.restUntil?new Date(injuries.restUntil):null;
  const isResting=restUntil&&today<restUntil;
  return(
    <div style={S.app}>
      <div style={S.banner}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{color:"#64748b",fontSize:9,letterSpacing:"0.12em",fontWeight:800}}>RACE · 2027.04.24 (토)</div>
            <div style={{color:"#f1f5f9",fontSize:14,fontWeight:800}}>하프마라톤 Sub-2:00</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:3,justifyContent:"flex-end"}}>
              <span style={{color:daysLeft<=21?"#f59e0b":"#67e8f9",fontSize:12,fontWeight:700}}>D-</span>
              <span style={{color:daysLeft<=21?"#f59e0b":"#67e8f9",fontSize:28,fontWeight:900,lineHeight:1,fontFamily:"ui-monospace,monospace"}}>{daysLeft}</span>
            </div>
          </div>
        </div>
      </div>
      {/* Feasibility */}
      <div style={{padding:"8px 12px 0"}}>
        <div style={{borderRadius:10,padding:"10px 12px",border:`1px solid ${feas.feasible?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}`,background:feas.feasible?"rgba(34,197,94,0.06)":"rgba(239,68,68,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{color:"#64748b",fontSize:9,fontWeight:800,letterSpacing:"0.08em"}}>SUB-2 예상</span>
            <span style={{color:feas.feasible?"#22c55e":"#ef4444",fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:4,background:`${feas.feasible?"#22c55e":"#ef4444"}15`}}>
              {feas.feasible?"✓ 가능":"✕ 불가능"}
            </span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{color:feas.feasible?"#22c55e":"#ef4444",fontSize:20,fontWeight:900,fontFamily:"ui-monospace,monospace"}}>{fmtMin(feas.predicted)}</span>
            <span style={{color:feas.feasible?"#22c55e":"#ef4444",fontSize:10,fontWeight:700}}>
              {feas.feasible?`여유 ${fmtPace(Math.abs(feas.diffMin))}`:`초과 +${fmtPace(feas.diffMin)}`}
            </span>
            <span style={{color:"#64748b",fontSize:9,marginLeft:"auto"}}>품질 {Math.round(feas.qualityRate*100)}%</span>
          </div>
        </div>
      </div>
      {/* Injury alert */}
      {isResting&&(
        <div style={{margin:"8px 12px 0",padding:"10px 12px",borderRadius:10,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)"}}>
          <div style={{color:"#f59e0b",fontSize:12,fontWeight:800}}>⚠️ 부상 휴식 중</div>
          <div style={{color:"#fbbf24",fontSize:11,marginTop:2}}>
            복귀 예정: {restUntil.getMonth()+1}/{restUntil.getDate()} · 남은 {daysBetween(today,restUntil)}일
          </div>
          <div style={{color:"#94a3b8",fontSize:10,marginTop:4}}>휴식 종료 후 1주 웜업 기간이 자동 반영됩니다</div>
        </div>
      )}
      {/* Nav */}
      <div style={S.nav}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.navBtn,...(tab===t.id?S.navActive:{})}}>
            <span style={{fontSize:t.id==="injury"?13:15,fontWeight:900}}>{t.icon}</span>

        ))}
      </div>
      <div style={S.content}>
        {tab==="quick"&&<QuickLog logs={logs} curWI={curWI} onUpdate={update} isResting={isResting}/>}
        {tab==="cal"&&<CalTab logs={logs} today={today}/>}
        {tab==="week"&&<WeekTab logs={logs} curWI={curWI} onUpdate={update} today={today}/>}
        {tab==="score"&&<ScoreTab logs={logs} curWI={curWI} feas={feas}/>}
        {tab==="injury"&&<InjuryTab injuries={injuries} setInjuries={setInjuries}/>}
      </div>
    </div>
  );
}

// ═══ QUICK LOG ═══

// ═══ CALENDAR TAB ═══
function CalTab({logs,today}){
  const[calM,setCalM]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const[selD,setSelD]=useState(null);
  const yr=calM.getFullYear(),mo=calM.getMonth();
  const fw=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
  const cells=[];for(let i=0;i<fw;i++)cells.push({d:addDays(new Date(yr,mo,1),-(fw-i)),out:true});
  for(let i=1;i<=dim;i++)cells.push({d:new Date(yr,mo,i),out:false});
  while(cells.length%7)cells.push({d:addDays(new Date(yr,mo,dim),cells.length-fw-dim+1),out:true});
  const selWI=selD?dateToWeekIdx(selD):-1;const selW=selWI>=0?WEEKS[selWI]:null;const selL=selWI>=0?(logs[selWI]||{}):{};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>setCalM(new Date(yr,mo-1,1))} style={S.calBtn}>‹</button>
        <div style={{flex:1,textAlign:"center",color:"#f1f5f9",fontSize:16,fontWeight:800}}>{yr}년 {mo+1}월</div>
        <button onClick={()=>setCalM(new Date(yr,mo+1,1))} style={S.calBtn}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
        {["일","월","화","수","목","금","토"].map((d,i)=><div key={i} style={{fontSize:9,fontWeight:800,padding:"4px 0",color:i===0?"#ef4444":i===6?"#06b6d4":"#64748b"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((c,i)=>{
          const wi=dateToWeekIdx(c.d);const wl=wi>=0?logs[wi]||{}:{};const w=wi>=0?WEEKS[wi]:null;
          const isT=sameDay(c.d,today);const isR=sameDay(c.d,RACE);const isSel=selD&&sameDay(c.d,selD);
          const doneCount=w?TASKS.filter(t=>wl[t.id]?.done).length:0;
          const phase=w?getPhase(wi):null;
          return(<div key={i} onClick={()=>!c.out&&setSelD(c.d)} style={{minHeight:42,padding:"3px 2px",borderRadius:4,cursor:c.out?"default":"pointer",
            background:isSel?"rgba(103,232,249,0.12)":isT?"rgba(103,232,249,0.06)":"transparent",
            border:isSel?"1px solid rgba(103,232,249,0.5)":isT?"1px solid rgba(103,232,249,0.25)":"1px solid rgba(255,255,255,0.03)",
            opacity:c.out?0.2:1}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:10,fontWeight:isT?900:500,color:isT?"#67e8f9":isR?"#f59e0b":c.d.getDay()===0?"#ef4444":c.d.getDay()===6?"#06b6d4":"#cbd5e1",fontFamily:"ui-monospace,monospace"}}>{c.d.getDate()}</span>
              {isR&&<span style={{fontSize:7}}>🏆</span>}
            </div>
            {doneCount>0&&<div style={{display:"flex",gap:1,marginTop:2,justifyContent:"center"}}>
              {Array.from({length:Math.min(doneCount,5)},(_,j)=><div key={j} style={{width:4,height:4,borderRadius:2,background:phase?.color||"#22c55e"}}/>)}
            </div>}
          </div>);
        })}
      </div>
      {selD&&selW&&(
        <div style={{...S.card,borderTop:`2px solid ${getPhase(selWI).color}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{color:"#64748b",fontSize:9,fontWeight:800}}>{selW.name} · {selW.phase}</div>
              <div style={{color:"#f1f5f9",fontSize:14,fontWeight:800,marginTop:1}}>{selD.getMonth()+1}월 {selD.getDate()}일 ({["일","월","화","수","목","금","토"][selD.getDay()]})</div>
            </div>
            <button onClick={()=>setSelD(null)} style={S.calBtn}>✕</button>
          </div>
          {TASKS.map(t=>{const log=selL[t.id]||{};const done=log.done;const q=done&&t.hasDist&&(log.distance||log.pace)?getTaskQuality(t,selW,log):null;
            return(<div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:6,background:done?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.01)",borderLeft:`3px solid ${done?t.color:"rgba(255,255,255,0.06)"}`,opacity:done?1:0.5,marginBottom:4}}>
              <span style={{fontSize:12}}>{done?"✓":t.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <span style={{color:done?t.color:"#94a3b8",fontSize:11,fontWeight:700}}>{t.type}</span>
                <span style={{color:"#475569",fontSize:9,marginLeft:4}}>{t.sugDay}</span>
                {done&&log.distance&&<span style={{color:"#94a3b8",fontSize:9,marginLeft:6}}>{log.distance}km{log.pace?` · ${log.pace}/km`:""}</span>}
                {q&&<span style={{color:q.color,fontSize:9,fontWeight:700,marginLeft:6}}>{q.pct}%</span>}
              </div>
            </div>);
          })}
          <div style={{marginTop:6,textAlign:"center"}}>
            <span style={{color:gradeInfo(weekScore(selW,selL)).color,fontSize:13,fontWeight:900,fontFamily:"ui-monospace,monospace"}}>{weekScore(selW,selL)}</span>
            <span style={{color:"#64748b",fontSize:10}}>/100</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ SCORE TAB ═══
function ScoreTab({logs,curWI,feas}){
  const weeklyData=useMemo(()=>WEEKS.map(w=>{const wl=logs[w.idx]||{};return{w,score:weekScore(w,wl),has:Object.values(wl).some(l=>l.done)}}),[logs]);
  const active=weeklyData.filter(d=>d.has);
  const avg=active.length?Math.round(active.reduce((s,d)=>s+d.score,0)/active.length):0;
  // Monthly data
  const months=[];for(let y=2026;y<=2027;y++){const mStart=y===2026?4:0;const mEnd=y===2027?4:11;
    for(let m=mStart;m<=mEnd;m++){const sc=monthScore(m,y,logs);months.push({y,m,label:`${y===2027?"'27 ":""}${m+1}월`,sc})}}
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{...S.card,background:`linear-gradient(135deg,${feas.feasible?"#22c55e":"#ef4444"}10,transparent)`,border:`1px solid ${feas.feasible?"#22c55e":"#ef4444"}30`}}>
        <div style={{color:"#64748b",fontSize:9,fontWeight:800,letterSpacing:"0.08em",marginBottom:3}}>예상 기록</div>

      </div>
      {active.length>0&&(
        <div style={S.card}><div style={{display:"flex",alignItems:"center",gap:12}}>
          <ScoreGauge score={avg} color={gradeInfo(avg).color} size={68}/>
          <div><div style={{color:"#64748b",fontSize:9,fontWeight:800}}>TRAINING AVG</div>
            <div style={{color:"#f1f5f9",fontSize:20,fontWeight:900,fontFamily:"ui-monospace,monospace"}}>{avg}<span style={{color:"#64748b",fontSize:12}}>/100</span></div>
            <div style={{color:"#94a3b8",fontSize:9,marginTop:2}}>활성 {active.length}/{WEEKS.length}주</div>
          </div>
        </div></div>
      )}
      <div style={S.card}>
        <div style={{color:"#64748b",fontSize:9,fontWeight:800,marginBottom:8}}>MONTHLY</div>
        {months.filter(m=>m.sc!==null).map(m=>{const g=gradeInfo(m.sc);return(
          <div key={`${m.y}-${m.m}`} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",background:"rgba(255,255,255,0.02)",borderRadius:5,marginBottom:3}}>
            <div style={{width:40,color:"#cbd5e1",fontSize:10,fontWeight:800}}>{m.label}</div>
            <div style={{flex:1,height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${m.sc}%`,background:g.color,borderRadius:2}}/></div>
            <div style={{width:24,textAlign:"right",color:g.color,fontSize:11,fontWeight:800,fontFamily:"ui-monospace,monospace"}}>{m.sc}</div>
          </div>);
        })}
      </div>
      <div style={S.card}>
        <div style={{color:"#64748b",fontSize:9,fontWeight:800,marginBottom:8}}>WEEKLY · {WEEKS.length}W</div>
        <div style={{display:"flex",gap:1,alignItems:"flex-end",height:50}}>
          {weeklyData.map((d,i)=>{const h=d.has?Math.max(d.score*0.5,3):3;const g=d.has?gradeInfo(d.score):null;
            return<div key={i} style={{flex:1,height:h,background:d.has?g.color:"rgba(255,255,255,0.04)",borderRadius:"1px 1px 0 0",
              outline:i===curWI?"1px solid #67e8f9":"none",boxShadow:i===curWI?"0 0 4px rgba(103,232,249,0.4)":"none"}}/>;
          })}
        </div>

          {PHASES.map(p=><span key={p.id} style={{color:p.color,fontSize:7,fontWeight:700}}>{p.name.substring(0,4)}</span>)}
        </div>
      </div>
    </div>
  );
}

// ═══ INJURY TAB ═══
function InjuryTab({injuries,setInjuries}){
  const[checks,setChecks]=useState({});
  const severeCount=INJURY_CHECKS.filter(c=>c.severe&&checks[c.id]).length;
  const mildCount=INJURY_CHECKS.filter(c=>!c.severe&&checks[c.id]).length;
  const totalChecked=severeCount+mildCount;
  const recommendation=severeCount>=2?"즉시 훈련 중단 · 정형외과 진료":severeCount===1?"3~5일 완전 휴식 후 재평가":mildCount>=2?"강도 50%로 줄이고 2~3일 관찰":mildCount===1?"주의하며 훈련 계속":"부상 징후 없음 ✓ 안전하게 훈련하세요";
  const recColor=severeCount>=2?"#ef4444":severeCount===1?"#f59e0b":mildCount>=2?"#f59e0b":"#22c55e";
  const startRest=(days)=>{
    const until=new Date();until.setDate(until.getDate()+days);
    setInjuries(p=>({...p,active:true,restUntil:until.toISOString(),startedAt:new Date().toISOString(),reason:INJURY_CHECKS.filter(c=>checks[c.id]).map(c=>c.q).join(", ")}));
  };
  const endRest=()=>{setInjuries(p=>({...p,active:false,restUntil:null}))};
  const isResting=injuries.active&&injuries.restUntil&&new Date()<new Date(injuries.restUntil);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{...S.card,borderTop:"3px solid #f59e0b"}}>
        <div style={{color:"#f1f5f9",fontSize:14,fontWeight:800,marginBottom:8}}>🩺 부상 자가 체크</div>
        <div style={{color:"#94a3b8",fontSize:10,marginBottom:10}}>해당되는 항목을 체크하세요. BJSM 가이드라인 기반 부상 위험 평가입니다.</div>
        {INJURY_CHECKS.map(c=>(
          <div key={c.id} onClick={()=>setChecks(p=>({...p,[c.id]:!p[c.id]}))} style={{
            display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,marginBottom:5,cursor:"pointer",
            background:checks[c.id]?(c.severe?"rgba(239,68,68,0.08)":"rgba(245,158,11,0.08)"):"rgba(255,255,255,0.02)",
            border:`1px solid ${checks[c.id]?(c.severe?"rgba(239,68,68,0.25)":"rgba(245,158,11,0.25)"):"rgba(255,255,255,0.05)"}`,
          }}>
            <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${checks[c.id]?(c.severe?"#ef4444":"#f59e0b"):"rgba(255,255,255,0.15)"}`,
              background:checks[c.id]?(c.severe?"#ef4444":"#f59e0b"):"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {checks[c.id]&&<span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{color:checks[c.id]?"#f1f5f9":"#94a3b8",fontSize:12,fontWeight:600}}>{c.q}</div>
              {c.severe&&<div style={{color:"#ef4444",fontSize:9,marginTop:1}}>⚠️ 심각 항목</div>}
            </div>
          </div>
        ))}
      </div>

      {totalChecked>0&&(
        <div style={{...S.card,background:`${recColor}08`,border:`1px solid ${recColor}30`}}>
          <div style={{color:recColor,fontSize:13,fontWeight:800,marginBottom:4}}>📋 권고사항</div>
          <div style={{color:"#f1f5f9",fontSize:12,fontWeight:600,lineHeight:1.5}}>{recommendation}</div>
          {severeCount>=1&&!isResting&&(
            <div style={{marginTop:10,display:"flex",gap:6}}>
              <button onClick={()=>startRest(5)} style={{...S.saveBtn,flex:1,padding:"10px 0",fontSize:12,background:"#f59e0b"}}>5일 휴식</button>
              <button onClick={()=>startRest(10)} style={{...S.saveBtn,flex:1,padding:"10px 0",fontSize:12,background:"#ef4444"}}>10일 휴식</button>
              <button onClick={()=>startRest(14)} style={{...S.saveBtn,flex:1,padding:"10px 0",fontSize:12,background:"#dc2626"}}>2주 휴식</button>
            </div>
          )}
        </div>
      )}

      {isResting&&(
        <div style={{...S.card,borderLeft:"4px solid #f59e0b"}}>
          <div style={{color:"#f59e0b",fontSize:13,fontWeight:800,marginBottom:4}}>⏸ 휴식 진행 중</div>
          <div style={{color:"#94a3b8",fontSize:11}}>
            시작: {new Date(injuries.startedAt).toLocaleDateString("ko")}
            {" · "}복귀: {new Date(injuries.restUntil).toLocaleDateString("ko")}
            {" · "}남은: {daysBetween(new Date(),new Date(injuries.restUntil))}일
          </div>
          <div style={{color:"#64748b",fontSize:10,marginTop:4}}>사유: {injuries.reason}</div>
          <button onClick={endRest} style={{...S.skipBtn,marginTop:8}}>✓ 통증 없음 · 훈련 복귀</button>
        </div>
      )}

      <div style={S.card}>
        <div style={{color:"#f1f5f9",fontSize:12,fontWeight:800,marginBottom:8}}>📌 복귀 프로토콜</div>
        <div style={{color:"#94a3b8",fontSize:11,lineHeight:1.6}}>
          <b style={{color:"#f59e0b"}}>1단계</b> 일상생활 통증 제로 (3~5일){"\n"}
          <b style={{color:"#06b6d4"}}>2단계</b> 걷기 30분 통증 제로 (1~2일){"\n"}
          <b style={{color:"#22c55e"}}>3단계</b> 조깅 15분 8:00/km 통증 제로{"\n"}
          <b style={{color:"#f1f5f9"}}>4단계</b> 복귀 후 첫 주는 50% 볼륨으로
        </div>
      </div>

      <div style={S.card}>
        <div style={{color:"#f1f5f9",fontSize:12,fontWeight:800,marginBottom:6}}>⚠️ 석이님 맞춤 주의사항</div>
        <div style={{color:"#fca5a5",fontSize:11,lineHeight:1.6}}>
          • 골프 라운딩 후 48시간 내 롱런 금지{"\n"}
          • 골프 스윙 연습 후 허리 불편감 → 다음 러닝 스킵{"\n"}
          • 웨이트(수) ↔ 롱런(토) 72시간 간격 유지{"\n"}
          • 데드리프트 시 허리 아치 과도하면 즉시 중단
        </div>
      </div>
    </div>
  );
}

// ═══ SCORE GAUGE ═══
function ScoreGauge({score,color,size}){
  size=size||70;const r=size/2-4;const c=2*Math.PI*r;const off=c-(score/100)*c;
  return(<svg width={size} height={size} style={{flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="4"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 0.5s"}}/>
    <text x="50%" y="50%" dy="0.35em" textAnchor="middle" fill={color} style={{fontSize:18,fontWeight:900,fontFamily:"ui-monospace,monospace"}}>{score}</text>
  </svg>);
}

const S={
  app:{background:"#080d17",minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",color:"#f1f5f9",paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)"},
  banner:{padding:"12px 16px 10px",background:"linear-gradient(135deg,#0a1220,#0f1a2e)",borderBottom:"1px solid rgba(255,255,255,0.05)"},
  nav:{display:"flex",background:"#0a1220",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",top:0,zIndex:10},
  navBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 0",background:"none",border:"none",color:"#475569",cursor:"pointer",borderBottom:"2px solid transparent"},
  navActive:{color:"#67e8f9",borderBottomColor:"#06b6d4",background:"rgba(6,182,212,0.04)"},
  content:{flex:1,padding:12,paddingBottom:28},
  card:{background:"rgba(255,255,255,0.025)",borderRadius:11,padding:12,border:"1px solid rgba(255,255,255,0.05)"},
  calBtn:{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",color:"#94a3b8",fontSize:16,cursor:"pointer",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"},
  jumpBtn:{padding:"6px 10px",background:"rgba(6,182,212,0.1)",border:"1px solid rgba(6,182,212,0.25)",borderRadius:7,color:"#67e8f9",fontSize:10,fontWeight:700,cursor:"pointer",alignSelf:"center"},
  taskCard:{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",background:"rgba(255,255,255,0.025)",borderRadius:9,border:"1px solid rgba(255,255,255,0.05)",cursor:"pointer",marginBottom:5},
  checkSm:{width:20,height:20,borderRadius:5,border:"2px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
  qInput:{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:10,color:"#f1f5f9",fontSize:15,outline:"none",boxSizing:"border-box",fontWeight:600},
  saveBtn:{width:"100%",padding:"14px 0",border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer"},
  skipBtn:{width:"100%",padding:"10px 0",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:"#94a3b8",fontSize:11,fontWeight:600,cursor:"pointer",marginTop:5},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
